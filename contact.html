<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
    <header>
        <div class="header">
            <h1>Contact Me</h1>
            <nav aria-label="Main Navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="contactMain">
        <h2>Get In Touch</h2>

        <form id="contactForm" action="send-email.php" method="POST">
            <!-- Name Field -->
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Name" required minlength="2">

            <!-- Phone Number Field -->
            <label for="user-phone">Phone number:</label>
            <input type="tel" id="user-phone" name="user-phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                placeholder="123-456-7890" required>

            <!-- Email Field -->
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Email" required>

            <!-- Message Field -->
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" placeholder="Message" required minlength="10"></textarea>

            <!-- Preferred contact method  -->
            <label for="contact-method">Preferred way to reach you:</label>
            <select id="contact-method" name="contact-method" required>
                <option value="" disabled selected>Select an option...</option>
                <option value="email">Email</option>
                <option value="phone">Phone Call</option>
                <option value="sms">Text Message (SMS)</option>
            </select>

            <!-- Submit Button -->
            <button type="submit">Send</button>
        </form>
    </main>

    <footer class="footer">
        <p>Contact me at <a href="mailto:junemakhubela@gmail.com" class="contactLink">junemakhubela@gmail.com</a></p>
    </footer>
</body>

</html>
